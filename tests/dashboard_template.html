<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Coverage Dashboard</title>
  <style>
    body { font-family: monospace; font-size: 11px; margin: 20px; }
    h1   { font-size: 16px; }
    .table-wrap { overflow: auto; max-width: 100%; max-height: 85vh; }
    table#dashboard { border-collapse: collapse; }
    .search-box { margin: 8px 0; }
    .search-box input { padding: 4px 8px; font-size: 12px; width: 300px; }
    thead th { white-space: nowrap; position: sticky; z-index: 10; background: #fff; }
    thead tr.group-row th { background: #dde8f5 !important; font-weight: bold; text-align: center; }
    thead tr.session-row th { white-space: normal; text-align: center; min-width: 40px; max-width: 80px; font-size: 10px; }
    tbody tr:nth-child(even) td { background-color: #f9f9f9; }
    tbody tr:nth-child(even) td.test-name { background-color: #f9f9f9; }
    tbody tr:hover td { filter: brightness(0.92); }
    td.test-name, th.test-name {
      position: sticky; left: 0; z-index: 5; background: #fff;
      text-align: left; white-space: nowrap; max-width: 400px;
      overflow: hidden; text-overflow: ellipsis;
    }
    thead th.test-name { z-index: 20; background: #fff; }
    thead tr.group-row th.test-name { background: #dde8f5 !important; }
    tr.file-group td {
      font-weight: bold; background: #eee !important;
      border-bottom: 1px solid #ccc; padding: 4px 6px;
    }
    th.skipped { color: #888; font-style: italic; }
    td.policy-cell { text-align: center; font-weight: bold; font-size: 12px; }
    .policy-always   { background: #c6efce; }
    .policy-nightly  { background: #ffeb9c; }
    .policy-weekends { background: #f4b942; }
    .policy-never    { background: #d9d9d9; }
    .policy-other    { background: #9fc5e8; }
    .policy-none     { background: #ffc7ce; }
    .legend { margin: 8px 0; }
    .legend-item {
      display: inline-block; margin-right: 8px;
      padding: 2px 10px; border: 1px solid #ccc;
    }
    #loading { font-size: 14px; padding: 20px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { html, h, render, Component } from 'https://unpkg.com/htm/preact/standalone.module.js';

    /**
     * @typedef {{ uid: string, stageName: string, markers: string|null, setup: string|null, policy: string, shouldRun: boolean, skipReason: string|null, tests: string[] }} Session
     * @typedef {{ name: string, sessions: Session[] }} Group
     * @typedef {{ allTests: string[], groups: Group[] }} DashboardJson
     * @typedef {{ label: string, children: TrieNode[], session: Session|null }} TrieNode
     * @typedef {{ label: string, colspan: number, rowspan: number, session: Session|null }} HeaderCell
     * @typedef {{ file: string|null, tests: string[] }} FileGroup
     * @typedef {Record<string, Record<string, boolean>>} TestSets
     */

    // ─────────────────────────────────────────────────────────────────
    // Policy — display constants and helpers for execution policies
    // ─────────────────────────────────────────────────────────────────
    class Policy {
      /** @type {Record<string, string>} */
      static EMOJI = { always: '\u2705', nightly: '\uD83C\uDF19', weekends: '\uD83C\uDF1E', never: '\u274C' };
      /** @type {string} */
      static NOT_COVERED = '\uD83D\uDEAB';
      /** @type {string[]} */
      static PRIORITY = ['always', 'weekends', 'nightly', 'never'];
      /** @type {Record<string, string>} */
      static CSS = { always: 'policy-always', nightly: 'policy-nightly', weekends: 'policy-weekends', never: 'policy-never' };

      /** @param {string|null} policy @returns {string} */
      static css(policy)   { return Policy.CSS[policy || 'always'] || 'policy-other'; }
      /** @param {string|null} policy @returns {string} */
      static emoji(policy) { return Policy.EMOJI[policy || 'always'] || '?'; }

      /**
       * Return the highest-priority policy covering a test across all sessions.
       * @param {string} testId
       * @param {Session[]} sessions
       * @param {TestSets} testSets
       * @returns {string|null}
       */
      static bestFor(testId, sessions, testSets) {
        let bestIdx = Policy.PRIORITY.length;
        for (const s of sessions) {
          if (testSets[s.uid]?.[testId]) {
            const idx = Policy.PRIORITY.indexOf(s.policy || 'always');
            if (idx >= 0 && idx < bestIdx) bestIdx = idx;
          }
        }
        return bestIdx < Policy.PRIORITY.length ? Policy.PRIORITY[bestIdx] : null;
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // UidTrie — hierarchical header structure from session UIDs
    // ─────────────────────────────────────────────────────────────────
    class UidTrie {
      /** @param {Session[]} sessions */
      constructor(sessions) {
        /** @type {TrieNode} */
        this.root = { label: '', children: [], session: null };
        for (const s of sessions) {
          let node = this.root;
          for (const part of s.uid.split('_')) {
            let child = node.children.find(c => c.label === part);
            if (!child) { child = { label: part, children: [], session: null }; node.children.push(child); }
            node = child;
          }
          node.session = s;
        }
      }

      /** @returns {number} */
      get depth() { return UidTrie._depth(this.root); }

      /** @param {TrieNode} n @returns {number} */
      static _depth(n) {
        return n.children.length === 0 ? 0 : 1 + Math.max(...n.children.map(UidTrie._depth));
      }

      /** @param {TrieNode} n @returns {number} */
      static _leafCount(n) {
        return n.children.length === 0 ? 1 : n.children.reduce((s, c) => s + UidTrie._leafCount(c), 0);
      }

      /**
       * Return an array of header-row arrays, each containing cell descriptors.
       * @param {number} totalRows
       * @returns {HeaderCell[][]}
       */
      headerCells(totalRows) {
        const rows = Array.from({ length: totalRows }, () => []);
        const walk = (node, depth) => {
          if (node.children.length === 0) {
            rows[depth].push({ label: node.label, colspan: 1, rowspan: totalRows - depth, session: node.session });
          } else {
            rows[depth].push({ label: node.label, colspan: UidTrie._leafCount(node), rowspan: 1, session: null });
            node.children.forEach(c => walk(c, depth + 1));
          }
        };
        this.root.children.forEach(c => walk(c, 0));
        return rows;
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // DashboardData — preprocesses JSON into queryable structures
    // ─────────────────────────────────────────────────────────────────
    class DashboardData {
      /** @param {DashboardJson} json */
      constructor(json) {
        /** @type {string[]} */
        this.allTests = json.allTests;
        /** @type {Group[]} */
        this.groups = json.groups.filter(g => g.sessions.length > 0);
        /** @type {Session[]} */
        this.allSessions = this.groups.flatMap(g => g.sessions);

        /** @type {TestSets} Per-session test lookup: { uid: { testId: true } } */
        this.testSets = {};
        for (const s of this.allSessions) {
          this.testSets[s.uid] = {};
          for (const t of (s.tests || [])) this.testSets[s.uid][t] = true;
        }

        /** @type {UidTrie[]} */
        this.tries = this.groups.map(g => new UidTrie(g.sessions));
        /** @type {number} */
        this.maxTrieDepth = Math.max(0, ...this.tries.map(t => t.depth));
      }

      /**
       * Filter tests by a search term (case-insensitive substring match).
       * @param {string} search
       * @returns {string[]}
       */
      filteredTests(search) {
        if (!search) return this.allTests;
        const term = search.toLowerCase();
        return this.allTests.filter(t => t.toLowerCase().includes(term));
      }

      /**
       * Group a list of tests by their file path.
       * @param {string[]} tests
       * @returns {FileGroup[]}
       */
      static groupByFile(tests) {
        const groups = [];
        let currentFile = null;
        let currentTests = [];
        for (const t of tests) {
          const sep = t.indexOf('::');
          const file = sep >= 0 ? t.substring(0, sep) : null;
          if (file !== currentFile) {
            if (currentTests.length) groups.push({ file: currentFile, tests: currentTests });
            currentFile = file;
            currentTests = [];
          }
          currentTests.push(t);
        }
        if (currentTests.length) groups.push({ file: currentFile, tests: currentTests });
        return groups;
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // Components
    // ─────────────────────────────────────────────────────────────────

    /** @param {{ testCount: number, sessionCount: number }} props */
    function Legend({ testCount, sessionCount }) {
      return html`
        <p>${testCount} test(s) | ${sessionCount} session(s)</p>
        <div class="legend">
          ${Policy.PRIORITY.map(p => html`
            <span class="legend-item policy-${p}">${Policy.EMOJI[p]} = ${p}</span>
          `)}
          <span class="legend-item policy-none">${Policy.NOT_COVERED} = not covered</span>
        </div>
      `;
    }

    /** @param {{ policy: string|null }} props */
    function PolicyCell({ policy }) {
      if (!policy) return html`<td class="policy-none policy-cell" title="not covered">${Policy.NOT_COVERED}</td>`;
      return html`<td class="${Policy.css(policy)} policy-cell" title=${policy}>${Policy.emoji(policy)}</td>`;
    }

    /** @param {{ data: DashboardData }} props */
    function TableHeader({ data }) {
      const totalRows = data.maxTrieDepth + 1;

      const groupRow = html`
        <tr class="group-row">
          <th rowspan=${totalRows} class="test-name">Test Node ID</th>
          <th rowspan=${totalRows}>Best</th>
          ${data.groups.map(g => html`<th colspan=${g.sessions.length}>${g.name}</th>`)}
        </tr>
      `;

      const allTrieRows = data.tries.map(t => t.headerCells(data.maxTrieDepth));
      const uidRows = Array.from({ length: data.maxTrieDepth }, (_, row) => html`
        <tr class="session-row">
          ${allTrieRows.map(trieRows => trieRows[row].map(cell => {
            const attrs = {};
            if (cell.colspan > 1) attrs.colspan = cell.colspan;
            if (cell.rowspan > 1) attrs.rowspan = cell.rowspan;
            const s = cell.session;
            if (s && !s.shouldRun) attrs.class = 'skipped';
            if (s) {
              const parts = [];
              if (s.markers) parts.push('markers: ' + s.markers);
              if (s.setup) parts.push('setup: ' + s.setup);
              if (!s.shouldRun && s.skipReason) parts.push('skip: ' + s.skipReason);
              if (parts.length) attrs.title = parts.join('\n');
            }
            return html`<th ...${attrs}>${cell.label}</th>`;
          }))}
        </tr>
      `);

      return html`${groupRow}${uidRows}`;
    }

    /** @param {{ testId: string, displayName: string, data: DashboardData }} props */
    function TestRow({ testId, displayName, data }) {
      const bestPolicy = Policy.bestFor(testId, data.allSessions, data.testSets);
      return html`
        <tr>
          <td class="test-name" title=${testId}>${displayName}</td>
          <${PolicyCell} policy=${bestPolicy} />
          ${data.allSessions.map(s =>
            data.testSets[s.uid]?.[testId]
              ? html`<${PolicyCell} policy=${s.policy || 'always'} />`
              : html`<td></td>`
          )}
        </tr>
      `;
    }

    /** @param {{ file: string, colCount: number }} props */
    function FileGroupRow({ file, colCount }) {
      return html`<tr class="file-group"><td class="test-name" colspan=${colCount}>${file}</td></tr>`;
    }

    /** @param {{ data: DashboardData, search: string }} props */
    function TableBody({ data, search }) {
      const tests = data.filteredTests(search);
      const fileGroups = DashboardData.groupByFile(tests);
      const colCount = 2 + data.allSessions.length;

      return html`${fileGroups.map(({ file, tests }) => html`
        ${file && html`<${FileGroupRow} file=${file} colCount=${colCount} />`}
        ${tests.map(testId => {
          const display = testId.startsWith('tests/') ? testId.substring(6) : testId;
          const sep = display.indexOf('::');
          const shortName = sep >= 0 ? display.substring(sep + 2) : display;
          return html`<${TestRow} testId=${testId} displayName=${shortName} data=${data} />`;
        })}
      `)}`;
    }

    /** Root component — manages data loading and search state. */
    class App extends Component {
      /** @type {{ data: DashboardData|null, error: string|null, search: string }} */
      state = { data: null, error: null, search: '' };

      componentDidMount() {
        fetch('data.json')
          .then(r => r.json())
          .then(json => this.setState({ data: new DashboardData(json) }))
          .catch(error => this.setState({ error: error.message }));
      }

      render(_, { data, error, search }) {
        if (error) return html`<p>Failed to load dashboard data: ${error}</p>`;
        if (!data) return html`<p id="loading">Loading dashboard data...</p>`;

        return html`
          <h1>Test Coverage Dashboard</h1>
          <${Legend} testCount=${data.allTests.length} sessionCount=${data.allSessions.length} />
          <div class="search-box">
            <input type="text" placeholder="Filter tests..."
                   value=${search} onInput=${e => this.setState({ search: e.target.value })} />
          </div>
          <div class="table-wrap">
            <table id="dashboard">
              <thead><${TableHeader} data=${data} /></thead>
              <tbody><${TableBody} data=${data} search=${search} /></tbody>
            </table>
          </div>
        `;
      }
    }

    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
